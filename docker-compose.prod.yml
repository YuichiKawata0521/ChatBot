services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    env_file:
      - .env.production
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app_net

  backend:
    build:
      context: ./backend
      target: prod
    restart: always
    env_file:
      - .env.production
    command: ["sh", "-c", "node scripts/createAdmin.js ; node scripts/createDevUsers.js ; node dist/server.js"]
    depends_on:
      db:
        condition: service_healthy
      llm:
        condition: service_started
    networks:
      - app_net

  llm:
    build:
      context: ./llm
    restart: always
    env_file:
      - .env.production
    volumes:
      - llm_cache:/app/.cache
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
      target: prod
    restart: always
    env_file:
      - .env.production
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - app_net

volumes:
  db_data:
  llm_cache:

networks:
  app_net:
    driver: bridge
