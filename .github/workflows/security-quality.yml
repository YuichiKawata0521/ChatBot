name: Security and Quality Checks

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      target_url:
        description: "DAST target URL"
        required: false
        default: ""

permissions:
  contents: read
  security-events: write

jobs:
  build-test-security:
    name: Build, Test and Static Security
    runs-on: ubuntu-latest
    env:
      PASSWORD_PEPPER: ${{ secrets.PASSWORD_PEPPER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "$PASSWORD_PEPPER" ]; then
            echo "PASSWORD_PEPPER is not set. Configure repository secret PASSWORD_PEPPER."
            exit 1
          fi

      # ----------------
      # Node setup
      # ----------------

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      # ----------------
      # Unit Tests
      # ----------------

      - name: Run backend tests
        id: backend_test
        working-directory: backend
        run: npm test
        continue-on-error: true

      - name: Run frontend tests
        id: frontend_test
        working-directory: frontend
        run: npm test
        continue-on-error: true

      # ----------------
      # Python setup
      # ----------------

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install python deps
        run: |
          pip install -r llm/requirements.txt
          pip install pytest pip-audit

      - name: Run python tests
        id: python_test
        continue-on-error: true
        run: pytest

      # ----------------
      # Dependency scans
      # ----------------

      - name: Audit backend deps
        id: audit_backend
        working-directory: backend
        run: npm run audit:security
        continue-on-error: true

      - name: Audit frontend deps
        id: audit_frontend
        working-directory: frontend
        run: npm run audit:security
        continue-on-error: true

      - name: Audit python deps
        id: audit_llm
        run: |
          pip-audit -r llm/requirements.txt
          pip-audit -r llm/requirements-heavy.txt
        continue-on-error: true

      # ----------------
      # SAST
      # ----------------

      - name: Run Semgrep
        id: semgrep_scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
        continue-on-error: true

      # ----------------
      # Docker Build
      # ----------------

      - name: Build backend Docker image
        id: docker_build_backend
        working-directory: backend
        run: docker build -t backend-image .
        continue-on-error: true

      - name: Build frontend Docker image
        id: docker_build_frontend
        working-directory: frontend
        run: docker build -t frontend-image .
        continue-on-error: true

      - name: Docker images
        run: docker images

      # ----------------
      # Start application
      # ----------------
      - name: Prepare env
        run: cp .env.production.example .env

      - name: Start application
        id: compose_up
        run: docker compose up -d --build

      - name: Wait for backend
        run: |
          ready=false
          for i in {1..30}; do
            if curl -f http://localhost:3000/api/health; then
              echo "Backend is ready"
              ready=true
              break
            fi
            echo "Waiting for backend..."
            sleep 2
          done
          if [ "$ready" != "true" ]; then
            echo "Backend did not become ready in time"
            docker compose ps
            docker compose logs backend --tail=200
            exit 1
          fi

      - name: Wait for frontend
        run: |
          ready=false
          for i in {1..30}; do
            if curl -f http://localhost:8080; then
              echo "Frontend is ready"
              ready=true
              break
            fi
            echo "Waiting for frontend..."
            sleep 2
          done
          if [ "$ready" != "true" ]; then
            echo "Frontend did not become ready in time"
            docker compose ps
            docker compose logs frontend --tail=200
            exit 1
          fi
      # ----------------
      # Install Playwright
      # ----------------

      - name: Run E2E tests
        id: e2e_test
        working-directory: frontend
        run: |
          if [ ! -f "playwright.config.ts" ] && [ ! -f "playwright.config.js" ] && [ ! -d "tests/e2e" ] && [ ! -d "e2e" ]; then
            echo "No Playwright config/tests found in frontend. Skipping E2E."
            exit 0
          fi
          npm install -D playwright
          npx playwright install --with-deps
          npx playwright test
        continue-on-error: true

      # ----------------
      # Trivy image scan
      # ----------------

      - name: Run Trivy backend image scan
        id: trivy_backend
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD":/work \
            aquasec/trivy:0.60.0 image \
            --format sarif \
            --output /work/trivy-backend-results.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            backend-image
        continue-on-error: true

      - name: Run Trivy frontend image scan
        id: trivy_frontend
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD":/work \
            aquasec/trivy:0.60.0 image \
            --format sarif \
            --output /work/trivy-frontend-results.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            frontend-image
        continue-on-error: true

      - name: Upload backend Trivy SARIF
        if: ${{ always() && hashFiles('trivy-backend-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend-results.sarif

      - name: Upload frontend Trivy SARIF
        if: ${{ always() && hashFiles('trivy-frontend-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend-results.sarif

      # ----------------
      # SBOM
      # ----------------

      - name: Generate SBOM
        id: sbom
        run: |
          docker run --rm aquasec/trivy:latest fs \
          --format cyclonedx \
          --output sbom.json \
          .
        continue-on-error: true

      - name: Upload SBOM
        if: ${{ always() && hashFiles('sbom.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      # ----------------
      # Security Gate
      # ----------------

      - name: Enforce pipeline gate
        if: ${{ always() }}
        run: |
          echo "backend test: ${{ steps.backend_test.outcome }}"
          echo "frontend test: ${{ steps.frontend_test.outcome }}"
          echo "python test: ${{ steps.python_test.outcome }}"
          echo "semgrep: ${{ steps.semgrep_scan.outcome }}"
          echo "docker build backend: ${{ steps.docker_build_backend.outcome }}"
          echo "docker build frontend: ${{ steps.docker_build_frontend.outcome }}"
          echo "trivy backend: ${{ steps.trivy_backend.outcome }}"
          echo "trivy frontend: ${{ steps.trivy_frontend.outcome }}"
          echo "e2e: ${{ steps.e2e_test.outcome }}"

          if [ "${{ steps.backend_test.outcome }}" != "success" ] || \
             [ "${{ steps.frontend_test.outcome }}" != "success" ] || \
             [ "${{ steps.python_test.outcome }}" != "success" ] || \
             [ "${{ steps.docker_build_backend.outcome }}" != "success" ] || \
             [ "${{ steps.docker_build_frontend.outcome }}" != "success" ] || \
             [ "${{ steps.semgrep_scan.outcome }}" != "success" ] || \
             [ "${{ steps.trivy_backend.outcome }}" != "success" ] || \
             [ "${{ steps.trivy_frontend.outcome }}" != "success" ] || \
             [ "${{ steps.e2e_test.outcome }}" != "success" ]; then
            echo "Pipeline gate failed."
            exit 1
          fi

  dynamic-security:
    name: Dynamic Security Scan (DAST)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || vars.DAST_TARGET_URL != '' }}
    env:
      TARGET_URL: ${{ github.event.inputs.target_url != '' && github.event.inputs.target_url || vars.DAST_TARGET_URL }}

    steps:
      - name: Validate target URL
        run: |
          if [ -z "$TARGET_URL" ]; then
            echo "No TARGET_URL configured."
            exit 1
          fi
          echo "DAST target: $TARGET_URL"

      - name: Run ZAP baseline
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          cmd_options: "-a -j -m 10"