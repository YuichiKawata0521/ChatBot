name: Security and Quality Checks

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      target_url:
        description: "DAST target URL (example: https://example.com)"
        required: false
        default: ""

permissions:
  contents: read
  security-events: write

jobs:
  static-security:
    name: Static Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: npm install --prefix backend

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Audit backend dependencies
        id: audit_backend
        run: npm run audit:security --prefix backend
        continue-on-error: true

      - name: Audit frontend dependencies
        id: audit_frontend
        run: npm run audit:security --prefix frontend
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit llm requirements
        id: audit_llm
        run: |
          pip-audit -r llm/requirements.txt
          pip-audit -r llm/requirements-heavy.txt
        continue-on-error: true

      - name: Run Trivy filesystem scan
        id: trivy_scan
        uses: aquasecurity/trivy-action@0.30.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy report to code scanning
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Enforce security gate
        if: ${{ always() }}
        run: |
          echo "backend audit outcome: ${{ steps.audit_backend.outcome }}"
          echo "frontend audit outcome: ${{ steps.audit_frontend.outcome }}"
          echo "llm audit outcome: ${{ steps.audit_llm.outcome }}"
          echo "trivy outcome: ${{ steps.trivy_scan.outcome }}"

          if [ "${{ steps.audit_backend.outcome }}" != "success" ] || \
             [ "${{ steps.audit_frontend.outcome }}" != "success" ] || \
             [ "${{ steps.audit_llm.outcome }}" != "success" ] || \
             [ "${{ steps.trivy_scan.outcome }}" != "success" ]; then
            echo "At least one static security check failed."
            exit 1
          fi

  dynamic-security:
    name: Dynamic Security Scan (DAST)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || vars.DAST_TARGET_URL != '' }}
    env:
      TARGET_URL: ${{ github.event.inputs.target_url != '' && github.event.inputs.target_url || vars.DAST_TARGET_URL }}

    steps:
      - name: Validate target URL
        run: |
          if [ -z "$TARGET_URL" ]; then
            echo "No TARGET_URL configured. Set workflow_dispatch input or repository variable DAST_TARGET_URL."
            exit 1
          fi
          echo "DAST target: $TARGET_URL"

      - name: Run OWASP ZAP Baseline
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          cmd_options: "-a -j -m 10"