<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>システムログ - ChatBot Admin</title>
    <link rel="stylesheet" href="../assets/css/pages/admin_dashboard.css">
    <link rel="stylesheet" href="../assets/css/pages/admin_users.css">
    <link rel="stylesheet" href="../assets/css/pages/admin_logs.css">
    <link rel="stylesheet" href="../assets/css/common/toast.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="admin-header">
        <div class="header-logo">ChatBot Admin / システムログ</div>
        <div class="header-actions">
            <span class="user-name">管理者 様</span>
            <a href="/admin" class="header-link">← 管理メニューへ</a>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="page-title">
            <h1>System Logs</h1>
            <div class="actions">
            </div>
        </div>

        <div class="card filter-card">
            <form class="filter-bar log-filter-bar" id="log-filter-form">
                <div class="filter-row">
                    <div class="filter-item">
                        <label>期間 (From - To)</label>
                        <div class="date-range-group">
                            <input type="date" class="date-input" id="filter-date-from">
                            <span class="separator">~</span>
                            <input type="date" class="date-input" id="filter-date-to">
                        </div>
                    </div>
                    <div class="filter-item">
                        <label>レベル</label>
                        <select id="filter-level">
                            <option value="">全て</option>
                            <option value="important" selected>WARN / ERROR のみ</option>
                            <option value="info">INFO</option>
                            <option value="http">HTTP</option>
                        </select>
                    </div>
                </div>
                
                <div class="filter-row">
                    <div class="filter-item search-box-wide">
                        <label>キーワード / ユーザー / モジュール</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" id="filter-keyword" placeholder="検索ワードを入力...">
                        </div>
                    </div>
                    <div class="filter-item actions">
                        <label>&nbsp;</label>
                        <button type="button" class="btn-secondary" id="search-btn">検索</button>
                        <button type="button" class="btn-secondary" id="clear-btn">クリア</button>
                        <button class="btn-secondary" id="export-btn"><i class="fa-solid fa-download"></i> CSVエクスポート</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="card table-card">
            <table class="data-table log-table">
                <thead>
                    <tr>
                        <th width="18%">日時</th>
                        <th width="8%">レベル</th>
                        <th width="20%">モジュール (操作)</th>
                        <th width="37%">メッセージ</th>
                        <th width="12%">ユーザー</th>
                        <th width="5%"></th>
                    </tr>
                </thead>
                <tbody id="log-table-body">
                </tbody>
            </table>
            
            <div class="pagination" id="pagination-container">
                </div>
        </div>
    </div>

    <div id="log-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content modal-lg"> 
            <div class="modal-header">
                <h3>ログ詳細 <span class="log-id" id="modal-log-id"></span></h3>
                <button class="close-modal" id="modal-close-icon">×</button>
            </div>
            <div class="modal-body">
                <div class="log-meta-grid">
                    <div class="meta-item">
                        <label>日時</label>
                        <div class="font-mono" id="modal-date"></div>
                    </div>
                    <div class="meta-item">
                        <label>レベル</label>
                        <div id="modal-level"></div>
                    </div>
                    <div class="meta-item">
                        <label>ユーザーID</label>
                        <div id="modal-user"></div>
                    </div>
                </div>

                <div class="log-section">
                    <h4>メッセージ</h4>
                    <p class="log-message-box" id="modal-message"></p>
                </div>

                <div class="log-section">
                    <h4>コンテキスト詳細 (JSON)</h4>
                    <pre class="code-block" id="modal-context"><code></code></pre>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary close-modal-btn" id="modal-close-btn">閉じる</button>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module" src="../js/pages/log/logs.js"></script>
</body>
</html>
