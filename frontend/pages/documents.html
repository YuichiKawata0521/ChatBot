<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ドキュメント管理 - ChatBot</title>
    <link rel="stylesheet" href="../assets/css/common/btn.css">
    <link rel="stylesheet" href="../assets/css/common/toast.css">
    <link rel="stylesheet" href="../assets/css/pages/admin_hub.css">
    <link rel="stylesheet" href="../assets/css/pages/admin_documents.css">
    <link rel="stylesheet" href="../assets/css/common/fontawesome-all.min.css">
</head>
<body>
    <header class="admin-header">
        <div class="header-logo">ChatBot Admin Console</div>
        <div class="header-actions">
            <span class="user-name" id="display-user-name">管理者 様</span>
            <a href="/pages/admin.html" class="header-link">管理メニューへ戻る</a>
            <a href="/chat" class="header-link">チャットへ</a>
        </div>
    </header>

    <main class="docs-container">
        <div class="page-header">
            <h2 class="section-title">ドキュメント管理</h2>
            <button class="btn btn-secondary" id="btn-reload"><i class="fa-solid fa-rotate-right"></i> 更新</button>
        </div>

        <div class="table-wrapper">
            <table class="docs-table">
                <thead>
                    <tr>
                        <th class="docs-col-title">ドキュメント名</th>
                        <th class="docs-col-type">種類</th>
                        <th class="docs-col-status">ステータス</th>
                        <th class="docs-col-uploaded">登録日時</th>
                        <th class="docs-col-actions">操作</th>
                    </tr>
                </thead>
                <tbody id="docs-table-body">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="modal-preview" class="modal-overlay" hidden>
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3>抽出テキストのプレビュー</h3>
                <button class="close-modal" id="close-preview-modal">&times;</button>
            </div>
            <div class="modal-body">
                <textarea id="preview-content" class="form-textarea" rows="20" readonly></textarea>
            </div>
        </div>
    </div>

    <div id="modal-rename" class="modal-overlay" hidden>
        <div class="modal-content">
            <div class="modal-header">
                <h3>タイトル変更</h3>
                <button class="close-modal" id="close-rename-modal">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="rename-doc-id">
                <div class="form-group">
                    <label>新しいタイトル</label>
                    <input type="text" id="rename-title-input" class="form-input">
                </div>
                <div class="modal-actions">
                    <button id="btn-save-rename" class="btn">変更を保存</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-reupload" class="modal-overlay" hidden>
        <div class="modal-content">
            <div class="modal-header">
                <h3>ファイルの再アップロード</h3>
                <button class="close-modal" id="close-reupload-modal">&times;</button>
            </div>
            <div class="modal-body">
                <p class="text-muted docs-reupload-note">
                    ドキュメントIDを維持したまま、中身を新しいファイルで上書き・再解析します。
                </p>
                <input type="hidden" id="reupload-doc-id">
                <div class="form-group">
                    <input type="file" id="reupload-file-input" class="form-control-file" accept=".pdf,.docx,.doc,.pptx,.ppt,.md,.txt">
                </div>
                <div class="modal-actions">
                    <button id="btn-save-reupload" class="btn">アップロードして再解析</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/js/pages/admin/documents_manage.js"></script>
</body>
</html>
