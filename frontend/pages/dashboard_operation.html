<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>運用ダッシュボード - ChatBot Admin</title>
    <link rel="stylesheet" href="../assets/css/pages/admin_dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="admin-header">
        <div class="header-logo">ChatBot Admin / 運用状況</div>
        <div class="header-actions">
            <span class="user-name">管理者 様</span>
            <a href="/admin" class="header-link">← 管理メニューへ</a>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="page-title">
            <h1>Operational Status</h1>
            <select id="kpi-month-scope" style="margin-left:auto; margin-right: 12px; padding: 6px 10px; border: 1px solid #d0d7de; border-radius: 6px;">
                <option value="current">当月</option>
                <option value="previous">先月</option>
            </select>
            <span class="last-updated" id="kpi-month-label">対象月: --</span>
            <span class="last-updated" id="kpi-last-updated">最終更新: --</span>
        </div>

        <div class="kpi-grid">
            <div class="stat-card">
                <span class="stat-title">DAU (Daily Active Users)</span>
                <div class="stat-value" id="kpi-dau"></div>
                <div class="stat-trend" id="kpi-dau-trend">-</div>
            </div>
            <div class="stat-card">
                <span class="stat-title">RAG利用率</span>
                <div class="stat-value" id="kpi-rag-rate"></div>
                <div class="stat-trend" id="kpi-rag-rate-trend">-</div>
            </div>
            <div class="stat-card">
                <span class="stat-title">利用継続率 (7日 / 30日)</span>
                <div class="stat-value" id="kpi-retention"></div>
                <div class="stat-trend" id="kpi-retention-trend">-</div>
            </div>
            <div class="stat-card">
                <span class="stat-title">エラー率</span>
                <div class="stat-value" id="kpi-error-rate"></div>
                <div class="stat-trend" id="kpi-error-rate-trend">-</div>
            </div>
        </div>

        <div class="grid-2-col" style="grid-template-columns: 2fr 1fr;">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">利用トレンド（日次）</h3>
                </div>
                <div class="chart-container-wrapper">
                    <canvas id="operationTrendChart"></canvas>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">利用低迷部署ランキング</h3>
                </div>
                <div style="padding: 10px;">
                    <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem;">
                        <thead>
                            <tr style="border-bottom: 2px solid #eee; text-align: left; white-space: nowrap;">
                                <th style="padding: 8px;">順位</th>
                                <th style="padding: 8px;">部署名</th>
                                <th style="padding: 8px; text-align: right;">メッセージ数</th>
                            </tr>
                        </thead>
                        <tbody id="department-ranking-table">
                        </tbody>
                    </table>
                    <div style="display: flex; justify-content: flex-end; margin-top: 12px;">
                        <button id="btn-view-all-departments" type="button" style="border: 1px solid #d0d7de; background: #fff; color: #2c3e50; margin: 0 auto; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 0.85rem;">
                            View All Departments
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid-2-col">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">RAG精度・品質指標</h3>
                </div>
                <table style="width: 100%; border-collapse: collapse;">
                    <tr style="border-bottom: 1px solid #eee;">
                        <td style="padding: 15px 10px;">
                            RAGヒット率
                            <span
                                title="RAGモードの回答のうち、relevance_score が 0.7 以上の参照チャンクを1件以上含む回答の割合"
                                aria-label="RAGヒット率の定義"
                                style="display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; margin-left:6px; border:1px solid #95a5a6; border-radius:50%; font-size:11px; color:#7f8c8d; cursor:help; user-select:none;"
                            >i</span>
                        </td>
                        <td style="text-align: right; font-weight: bold; font-size: 1.2rem;" id="rag-hit-rate">88%</td>
                    </tr>
                    <tr>
                        <td style="padding: 15px 10px;">
                            平均参照親チャンク数
                            <span
                                title="RAGモードの回答1件あたりに参照された親チャンク数（distinct parent_chunk_id）の平均。参照なし回答は0件として計算"
                                aria-label="平均参照親チャンク数の定義"
                                style="display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; margin-left:6px; border:1px solid #95a5a6; border-radius:50%; font-size:11px; color:#7f8c8d; cursor:help; user-select:none;"
                            >i</span>
                        </td>
                        <td style="text-align: right; font-weight: bold; font-size: 1.2rem;" id="rag-avg-chunks">3.2</td>
                    </tr>
                </table>
            </div>

            <div class="card" style="border-top: 4px solid #f1c40f;">
                <div class="card-header">
                    <h3 class="card-title">コスト</h3>
                </div>
                <div style="padding: 20px 10px;">
                    <span style="font-size: 0.9rem; color: #7f8c8d;">今月の推定コスト</span>
                    <div style="font-size: 2.5rem; font-weight: bold; margin-top: 10px;" id="estimated-cost"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="department-ranking-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1200; align-items:center; justify-content:center;">
        <div style="width:min(900px, 92vw); max-height:80vh; overflow:auto; background:#fff; border-radius:8px; box-shadow:0 10px 28px rgba(0,0,0,.18);">
            <div style="display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid #eee;">
                <h3 style="margin:0; font-size:1rem; color:#2c3e50;">全部署ランキング</h3>
                <button id="btn-close-department-modal" type="button" style="border:none; background:transparent; font-size:1.4rem; line-height:1; cursor:pointer; color:#7f8c8d;">×</button>
            </div>
            <div style="padding:12px 16px;">
                <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:12px;">
                    <select id="department-modal-filter-dep1" style="min-width:160px; padding:6px 8px; border:1px solid #d0d7de; border-radius:6px;">
                        <option value="">部署1: すべて</option>
                    </select>
                    <select id="department-modal-filter-dep2" style="min-width:160px; padding:6px 8px; border:1px solid #d0d7de; border-radius:6px;">
                        <option value="">部署2: すべて</option>
                    </select>
                    <select id="department-modal-filter-dep3" style="min-width:160px; padding:6px 8px; border:1px solid #d0d7de; border-radius:6px;">
                        <option value="">部署3: すべて</option>
                    </select>
                    <button id="btn-clear-department-modal-filter" type="button" style="border:1px solid #d0d7de; background:#fff; color:#2c3e50; padding:6px 10px; border-radius:6px; cursor:pointer; font-size:0.85rem;">
                        クリア
                    </button>
                </div>
                <table style="width:100%; border-collapse: collapse; font-size: 0.9rem;">
                    <thead>
                        <tr style="border-bottom: 2px solid #eee; text-align: left; white-space: nowrap;">
                            <th style="padding: 8px;">順位</th>
                            <th style="padding: 8px;">部署1</th>
                            <th style="padding: 8px;">部署2</th>
                            <th style="padding: 8px;">部署3</th>
                            <th style="padding: 8px; text-align: right;">メッセージ数</th>
                        </tr>
                    </thead>
                    <tbody id="department-ranking-modal-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="../js/pages/admin/dashboard_operation/main.js"></script>
</body>
</html>
