<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>運用ダッシュボード - ChatBot Admin</title>
    <link rel="stylesheet" href="../assets/css/pages/admin_dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="admin-header">
        <div class="header-logo">ChatBot Admin / 運用状況</div>
        <div class="header-actions">
            <span class="user-name">管理者 様</span>
            <a href="/admin" class="header-link">← 管理メニューへ</a>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="page-title">
            <h1>Operational Status</h1>
            <select id="kpi-month-scope" class="operation-month-scope-select">
                <option value="current">当月</option>
                <option value="previous">先月</option>
            </select>
            <span class="last-updated" id="kpi-month-label">対象月: --</span>
            <span class="last-updated" id="kpi-last-updated">最終更新: --</span>
        </div>

        <div class="kpi-grid">
            <div class="stat-card">
                <span class="stat-title">
                    DAU (Daily Active Users)
                    <span
                        title="対象日のうち1回以上チャットを利用したユニークユーザー数"
                        aria-label="DAUの定義"
                        class="operation-help-icon"
                    >i</span>
                </span>
                <div class="stat-value" id="kpi-dau"></div>
                <div class="stat-trend" id="kpi-dau-trend">-</div>
            </div>
            <div class="stat-card">
                <span class="stat-title">
                    RAG利用率
                    <span
                        title="全チャット回答のうち、RAGモードで生成された回答の割合"
                        aria-label="RAG利用率の定義"
                        class="operation-help-icon"
                    >i</span>
                </span>
                <div class="stat-value" id="kpi-rag-rate"></div>
                <div class="stat-trend" id="kpi-rag-rate-trend">-</div>
            </div>
            <div class="stat-card">
                <span class="stat-title">
                    利用継続率 (7日 / 30日)
                    <span
                        title="初回利用ユーザーのうち、7日以内・30日以内に再利用したユーザーの割合"
                        aria-label="利用継続率の定義"
                        class="operation-help-icon"
                    >i</span>
                </span>
                <div class="stat-value" id="kpi-retention"></div>
                <div class="stat-trend" id="kpi-retention-trend">-</div>
            </div>
            <div class="stat-card">
                <span class="stat-title">
                    エラー率
                    <span
                        title="全リクエストのうち、処理が失敗してエラーとなった割合"
                        aria-label="エラー率の定義"
                        class="operation-help-icon"
                    >i</span>
                </span>
                <div class="stat-value" id="kpi-error-rate"></div>
                <div class="stat-trend" id="kpi-error-rate-trend">-</div>
            </div>
        </div>

        <div class="grid-2-col operation-grid-2-1">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">利用トレンド（日次）</h3>
                </div>
                <div class="chart-container-wrapper">
                    <canvas id="operationTrendChart"></canvas>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">利用低迷部署ランキング</h3>
                </div>
                <div class="operation-card-table-wrap">
                    <table class="operation-ranking-table">
                        <thead>
                            <tr class="operation-table-head-row operation-table-head-row-nowrap">
                                <th class="operation-th-pad-8">順位</th>
                                <th class="operation-th-pad-8">部署名</th>
                                <th class="operation-th-pad-8 operation-th-align-right">メッセージ数</th>
                            </tr>
                        </thead>
                        <tbody id="department-ranking-table">
                        </tbody>
                    </table>
                    <div class="operation-dept-viewall-wrap">
                        <button id="btn-view-all-departments" type="button" class="operation-btn-secondary-sm operation-btn-center">
                            View All Departments
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid-2-col">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">RAG精度・品質指標</h3>
                </div>
                <table class="operation-kpi-table">
                    <tr class="operation-kpi-row">
                        <td class="operation-kpi-label-cell">
                            RAGヒット率
                            <span
                                title="RAGモードの回答のうち、relevance_score が 0.7 以上の参照チャンクを1件以上含む回答の割合"
                                aria-label="RAGヒット率の定義"
                                class="operation-help-icon"
                            >i</span>
                        </td>
                        <td class="operation-kpi-value-cell" id="rag-hit-rate">88%</td>
                    </tr>
                    <tr>
                        <td class="operation-kpi-label-cell">
                            平均参照親チャンク数
                            <span
                                title="RAGモードの回答1件あたりに参照された親チャンク数（distinct parent_chunk_id）の平均。参照なし回答は0件として計算"
                                aria-label="平均参照親チャンク数の定義"
                                class="operation-help-icon"
                            >i</span>
                        </td>
                        <td class="operation-kpi-value-cell" id="rag-avg-chunks">3.2</td>
                    </tr>
                </table>
            </div>

            <div class="card operation-cost-card">
                <div class="card-header">
                    <h3 class="card-title">コスト</h3>
                </div>
                <div class="operation-cost-wrap">
                    <span class="operation-cost-caption">今月の推定コスト</span>
                    <div class="operation-cost-value" id="estimated-cost"></div>
                </div>
            </div>
        </div>
        <div class="link">
            <a id="analysis-link">分析ページへ移動</a>
        </div>
    </div>

    <div id="department-ranking-modal" class="operation-modal-overlay">
        <div class="operation-modal-panel">
            <div class="operation-modal-header">
                <h3 class="operation-modal-title">全部署ランキング</h3>
                <button id="btn-close-department-modal" type="button" class="operation-modal-close-btn">×</button>
            </div>
            <div class="operation-modal-content">
                <div class="operation-modal-filter-row">
                    <select id="department-modal-filter-dep1" class="operation-modal-select">
                        <option value="">部署1: すべて</option>
                    </select>
                    <select id="department-modal-filter-dep2" class="operation-modal-select">
                        <option value="">部署2: すべて</option>
                    </select>
                    <select id="department-modal-filter-dep3" class="operation-modal-select">
                        <option value="">部署3: すべて</option>
                    </select>
                    <button id="btn-clear-department-modal-filter" type="button" class="operation-btn-secondary-sm">
                        クリア
                    </button>
                </div>
                <table class="operation-ranking-modal-table">
                    <thead>
                        <tr class="operation-table-head-row operation-table-head-row-nowrap">
                            <th class="operation-th-pad-8">順位</th>
                            <th class="operation-th-pad-8">部署1</th>
                            <th class="operation-th-pad-8">部署2</th>
                            <th class="operation-th-pad-8">部署3</th>
                            <th class="operation-th-pad-8 operation-th-align-right">メッセージ数</th>
                        </tr>
                    </thead>
                    <tbody id="department-ranking-modal-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="../js/pages/admin/dashboard_operation/main.js"></script>
</body>
</html>
