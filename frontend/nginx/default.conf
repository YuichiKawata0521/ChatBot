server {
    listen 80;
    server_name yk-pf.com www.yk-pf.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name yk-pf.com www.yk-pf.com;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    if ($request_method = TRACE) {
        return 405;
    }

    ssl_stapling off;
    ssl_stapling_verify off;

    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "no-referrer-when-downgrade";
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    add_header Content-Security-Policy "
        default-src 'self';
        style-src 'self';
        script-src 'self' https://cdn.jsdelivr.net;
        connect-src 'self';
        base-url 'self';
        form-action 'self';
        frame-ancestors 'none';
        object-src 'none';
    " always;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    root /usr/share/nginx/html;
    index users.html;

    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = / {
        return 302 /chat;
    }

    location ~ ^/(login|admin|chat|users|logs|documents|change_password|dashboard_operation|dashboard_analysis)\.html$ {
        return 301 /$1;
    }

    location ~ ^/(login|admin|chat|users|logs|documents|change_password|dashboard_operation|dashboard_analysis)$ {
        try_files /pages/$1.html =404;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
    }

    location /api/v1/ {
        if ($api_allowed_method = 0) {
            return 405;
        }
 
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_hide_header Server;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering off;
    }
}